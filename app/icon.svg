<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d8bf2"/>
      <stop offset="1" stop-color="#1a5fd0"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f1ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.2" flood-color="#0b3c8c" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- base squircle -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="#ffffff" opacity="0.06"/>

  <!-- moldura do monitor -->
  <rect x="24" y="26" width="80" height="60" rx="8"
        fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="3"/>

  <!-- células da grade (2 linhas × 3 colunas), uma em destaque -->
  <g filter="url(#shadow)">
    <rect x="30" y="32" width="20" height="21" rx="4" fill="url(#tile)" opacity="0.9"/>
    <rect x="53" y="32" width="20" height="21" rx="4" fill="#bcd6ff"/>
    <rect x="76" y="32" width="22" height="21" rx="4" fill="url(#tile)" opacity="0.9"/>
    <rect x="30" y="56" width="20" height="23" rx="4" fill="#bcd6ff"/>
    <!-- célula ativa larga (span) -->
    <rect x="53" y="56" width="45" height="23" rx="4" fill="url(#tile)"/>
  </g>

  <!-- pé do monitor -->
  <rect x="56" y="86" width="16" height="7" rx="2" fill="#ffffff" opacity="0.5"/>
  <rect x="46" y="93" width="36" height="6" rx="3" fill="#ffffff" opacity="0.5"/>
</svg>
